# ABOUTME: Fly.io app config for temple-web-dev (React/nginx SPA).
# ABOUTME: Run `fly deploy --config infra/fly/temple-web-dev.toml` from the web/ directory.

app = 'temple-web-dev'
primary_region = 'iad'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
