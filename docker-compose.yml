# ABOUTME: Development stack — PostgreSQL 16, Mailpit, and all application services.
# ABOUTME: Use profiles to start components selectively: --profile api|web|workers|full.
services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: templehe
      POSTGRES_USER: templehe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U templehe -d templehe"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21.3
    ports:
      - "8025:8025"  # Web UI — http://localhost:8025
      - "1025:1025"  # SMTP
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./api
    env_file: .env
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    profiles: [api, full]

  web:
    build:
      context: ./web
      args:
        VITE_R2_PUBLIC_URL: ${VITE_R2_PUBLIC_URL:-}
    profiles: [web, full]

  notification-worker:
    build:
      context: ./api
    command: ["python", "scripts/notification_worker.py"]
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      PYTHONPATH: /app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [workers, full]

  sweeper:
    build:
      context: ./api
    command: ["python", "scripts/sweep_retention.py"]
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      PYTHONPATH: /app
    env_file: .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [workers, full]

volumes:
  postgres_data:
