# ABOUTME: Local development stack — PostgreSQL 15 and Mailpit (email catcher).
# ABOUTME: No Redis in POC; rate limiting and session storage use Postgres tables.
services:
  postgres:
    image: postgres:15.7-alpine
    environment:
      POSTGRES_DB: templehe
      POSTGRES_USER: templehe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U templehe -d templehe"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21.3
    ports:
      - "8025:8025"  # Web UI — http://localhost:8025
      - "1025:1025"  # SMTP
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
