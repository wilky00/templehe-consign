# ABOUTME: Alembic configuration for database migrations.
# ABOUTME: sqlalchemy.url is overridden at runtime by env.py from DATABASE_URL env var.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden in env.py — placeholder keeps alembic.ini valid
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
