# ABOUTME: Nginx config for staging (saltrun-staging). Extends nginx.conf by proxying
# ABOUTME: /api/ to the api container — eliminates cross-origin calls from the browser.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the FastAPI container on the internal docker network.
    # The SPA uses relative /api/v1 paths; nginx forwards them here so there
    # is no cross-origin request from the browser.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static assets directly with aggressive caching.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other requests → SPA entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files.
    location ~ /\. {
        deny all;
    }
}
