# ABOUTME: Security scanning workflow — runs on push to main and weekly on Mondays.
# ABOUTME: Covers secret scanning (gitleaks), container CVEs (Trivy), and dependency audits.

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t temple-api:ci api/

      # Two-step pattern: gate scan (table format) actually honors the
      # plain .trivyignore suppressions and drives the CI exit code; the
      # SARIF scan exists only to upload findings to the GitHub Security
      # tab. SARIF + plain .trivyignore historically don't suppress the
      # exit-code path together — the workflow saw 5 documented CVEs
      # (already in .trivyignore per ADR-012) re-fail every push to main.
      # Splitting the runs decouples the two concerns and pins to a
      # tagged action release for stability.
      - name: Run Trivy gate (honors .trivyignore)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: temple-api:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: false
          trivyignores: .trivyignore

      - name: Run Trivy SARIF (for GitHub Security)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: temple-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # exit-code intentionally 0 — the gate above already failed if
          # any unsuppressed CVE was found. This step uploads the full
          # picture (including suppressed CVEs) so the Security tab shows
          # the complete inventory.
          exit-code: '0'
          ignore-unfixed: false
          limit-severities-for-sarif: 'true'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.5.4'

      - name: Install API deps
        run: cd api && uv sync

      - name: Run pip-audit
        # CVE-2026-3219 is against `pip` itself, which we use only as a
        # build-time tool inside `uv sync` — runtime is `uv`, not pip. No
        # upstream fix yet. Re-evaluate this suppression every quarter
        # (tracked alongside .trivyignore reviews per ADR-012).
        run: cd api && uvx pip-audit --ignore-vuln CVE-2026-3219

  npm-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web deps
        run: cd web && npm ci

      - name: Run npm audit
        run: cd web && npm audit --audit-level=high
