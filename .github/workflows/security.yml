# ABOUTME: Security scanning workflow — runs on push to main and weekly on Mondays.
# ABOUTME: Covers secret scanning (gitleaks), container CVEs (Trivy), and dependency audits.

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t temple-api:ci api/

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: temple-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          # ignore-unfixed: false (default) — surface unfixed CRITICAL/HIGH
          # CVEs. Suppressions must be per-CVE in a .trivyignore file with a
          # written justification; silencing the whole class hides exploitable
          # bugs that upstream hasn't patched yet.
          ignore-unfixed: false
          # Explicit path to the suppression file — the action doesn't pass
          # --ignorefile unless this is set, even if .trivyignore is at repo root.
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.5.4'

      - name: Install API deps
        run: cd api && uv sync

      - name: Run pip-audit
        run: cd api && uvx pip-audit

  npm-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web deps
        run: cd web && npm ci

      - name: Run npm audit
        run: cd web && npm audit --audit-level=high
